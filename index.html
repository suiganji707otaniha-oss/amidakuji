<!doctype html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>みんなであみだくじ</title>
    <style>
    :root {
        --bg1: #fff7b8;
        --bg2: #dff7ff;
        --bg3: #ffe1f0;
        --card: #ffffff;
        --ink: #283044;
        --muted: #6b7280;
        --main: #ff7aa8;
        --main2: #5ac8fa;
        --accent: #82e0aa;
        --warn: #ffb020;
        --danger: #ef4444;
        --line: #354052;
        --random: #9ca3af;
        --player: #ff4d8d;
        --shadow: 0 14px 32px rgba(40, 48, 68, .16);
        --radius: 22px;
    }

    * {
        box-sizing: border-box
    }

    body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--ink);
        background: linear-gradient(135deg, var(--bg1), var(--bg2) 48%, var(--bg3));
        min-height: 100vh
    }

    .wrap {
        max-width: 1040px;
        margin: 0 auto;
        padding: 22px 14px 40px
    }

    header {
        padding: 18px 4px 10px;
        text-align: center
    }

    h1 {
        font-size: clamp(28px, 6vw, 48px);
        margin: 0 0 6px;
        letter-spacing: .04em
    }

    .lead {
        margin: 0;
        color: #475569;
        font-weight: 700
    }

    .versionNote {
        margin: 18px auto 0;
        text-align: center;
        font-size: 12px;
        color: rgba(100, 116, 139, .55);
        font-weight: 700
    }

    .heroArt {
        display: flex;
        justify-content: center;
        margin: 10px auto 0;
        max-width: 420px;
        filter: drop-shadow(0 10px 18px rgba(40, 48, 68, .14))
    }

    .heroArt svg {
        min-width: 0;
        width: 100%;
        height: auto;
        touch-action: auto
    }

    .steps {
        background: rgba(255, 255, 255, .91);
        border: 2px solid rgba(255, 255, 255, .95);
        border-radius: var(--radius);
        padding: 14px 16px;
        margin: 18px 0;
        box-shadow: 0 10px 24px rgba(40, 48, 68, .10)
    }

    .stepsTitle {
        font-weight: 900;
        margin: 0 0 10px;
        color: #be185d
    }

    .stepList {
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px
    }

    @media (min-width: 760px) {
        .stepList {
            grid-template-columns: repeat(6, 1fr)
        }
    }

    .step {
        background: #fff7fb;
        border: 2px solid #ffd0e2;
        border-radius: 16px;
        padding: 10px 8px;
        text-align: center;
        font-weight: 900;
        font-size: 14px
    }

    .step strong {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background: var(--main);
        color: white;
        margin: 0 auto 6px
    }

    .step span {
        display: block;
        line-height: 1.35
    }

    .grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 16px
    }

    @media (min-width: 880px) {
        .grid.two {
            grid-template-columns: 360px 1fr
        }
    }

    .card {
        background: rgba(255, 255, 255, .92);
        border-radius: var(--radius);
        padding: 18px;
        box-shadow: var(--shadow);
        border: 2px solid rgba(255, 255, 255, .8)
    }

    h2 {
        font-size: 22px;
        margin: 0 0 12px
    }

    h3 {
        font-size: 18px;
        margin: 18px 0 10px
    }

    label {
        display: block;
        font-weight: 800;
        margin: 10px 0 6px
    }

    input, select, textarea {
        width: 100%;
        font: inherit;
        font-size: 17px;
        padding: 12px 13px;
        border-radius: 14px;
        border: 2px solid #dbe3ef;
        background: white;
        color: var(--ink)
    }

    textarea {
        min-height: 132px;
        resize: vertical;
        line-height: 1.55
    }

    .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px
    }

    .btns {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 14px
    }

    button, .buttonLink {
        border: 0;
        border-radius: 999px;
        padding: 12px 18px;
        font: inherit;
        font-weight: 900;
        color: white;
        background: var(--main);
        box-shadow: 0 8px 18px rgba(255, 122, 168, .28);
        cursor: pointer;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px
    }

    button.secondary, .buttonLink.secondary {
        background: var(--main2);
        box-shadow: 0 8px 18px rgba(90, 200, 250, .25)
    }

    button.green {
        background: #22c55e;
        box-shadow: 0 8px 18px rgba(34, 197, 94, .2)
    }

    button.warn {
        background: var(--warn);
        box-shadow: 0 8px 18px rgba(255, 176, 32, .22)
    }

    button.danger {
        background: var(--danger);
        box-shadow: 0 8px 18px rgba(239, 68, 68, .22)
    }

    button:disabled {
        opacity: .45;
        cursor: not-allowed;
        box-shadow: none
    }

    .pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 7px 11px;
        border-radius: 999px;
        background: #f1f5f9;
        font-weight: 800;
        color: #475569;
        margin: 3px
    }

    .pill.now {
        background: #ffe4ef;
        color: #be185d;
        border: 2px solid #ff9ec4
    }

    .notice {
        padding: 12px 14px;
        border-radius: 16px;
        background: #fff8db;
        border: 2px solid #ffe08a;
        color: #5f4500;
        font-weight: 700;
        margin: 10px 0
    }

    .ok {
        background: #dcfce7;
        border-color: #86efac;
        color: #166534
    }

    .bad {
        background: #fee2e2;
        border-color: #fca5a5;
        color: #991b1b
    }

    .small {
        font-size: 14px;
        color: #64748b;
        line-height: 1.6
    }

    .qrBox {
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, #fff, #f8fbff);
        border-radius: 24px;
        border: 3px dashed #5ac8fa;
        padding: 16px;
        margin-top: 10px
    }

    .qrBox img {
        width: min(260px, 86vw);
        height: min(260px, 86vw);
        image-rendering: pixelated
    }

    .qrBox.zoomable {
        cursor: pointer;
        position: relative;
        transition:.15s transform, .15s box-shadow
    }

    .qrBox.zoomable:hover {
        transform: translateY(-2px);
        box-shadow:0 12px 24px rgba(90, 200, 250, .22)
    }

    .qrZoomHint {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        margin-top: 8px;
        padding: 7px 11px;
        border-radius: 999px;
        background: #fff0f6;
        color: #be185d;
        border: 2px solid #ffc4dc;
        font-weight: 900;
        font-size: 13px
    }

    .modalBackdrop {
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, .62);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        padding:16px
    }

    .modalBackdrop.show {
        display:flex
    }

    .qrModal {
        width: min(560px, 94vw);
        background: linear-gradient(180deg, #ffffff, #fff7fb);
        border-radius: 28px;
        padding: 20px;
        box-shadow: 0 24px 70px rgba(0, 0, 0, .32);
        text-align: center;
        border:4px solid #ffd0e2
    }

    .qrModal img {
        width: min(430px, 82vw);
        height: min(430px, 82vw);
        image-rendering:pixelated
    }

    .qrModal h2 {
        color: #be185d;
        margin-bottom:6px
    }

    .modalClose {
        margin-top:12px
    }

    .cuteBadge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-radius: 999px;
        background: #fff7ed;
        border: 2px solid #fed7aa;
        color: #9a3412;
        font-weight: 900
    }

    .shareBox {
        background: #f0f9ff;
        border: 2px solid #bae6fd;
        border-radius: 18px;
        padding: 12px;
        margin-top: 12px
    }

    .copyRow {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
        align-items: center
    }

    .copyRow input {
        font-size: 14px;
        padding: 10px 11px
    }

    details.hostDetails {
        margin-top: 12px;
        background: #f8fafc;
        border: 2px solid #e2e8f0;
        border-radius: 16px;
        padding: 10px 12px
    }

    details.hostDetails summary {
        cursor: pointer;
        font-weight: 900;
        color: #64748b
    }

    .boardWrap {
        overflow: auto;
        background: white;
        border-radius: 24px;
        padding: 14px;
        border: 3px solid rgba(90, 200, 250, .35);
        position: relative
    }

    .tapHint {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin: 0 0 10px;
        padding: 10px 13px;
        border-radius: 999px;
        background: #ffe4ef;
        border: 2px solid #ff9ec4;
        color: #be185d;
        font-weight: 900
    }

    svg {
        display: block;
        min-width: 600px;
        width: 100%;
        height: auto;
        touch-action: manipulation
    }

    .slot {
        cursor: pointer;
        opacity: .06;
        transition:.15s
    }

    .slot:hover {
        opacity:.8
    }

    .slot.active {
        opacity: .9;
        animation:pulseSlot 1.2s ease-in-out infinite
    }

    .slot.disabled {
        cursor: not-allowed;
        opacity: .01;
        pointer-events:none
    }

    .slot.chosen {
        opacity: 1;
        animation: none
    }

    @keyframes pulseSlot {
        0%, 100% {
            transform: scale(1);
            opacity:.76
        }

        50% {
            transform: scale(1.04);
            opacity: 1
        }
    }

    .slotRect {
        fill: #ff7aa8;
        stroke: white;
        stroke-width:3
    }

    .slot.active .slotRect {
        filter:drop-shadow(0 4px 6px rgba(255, 77, 141, .55))
    }

    .slot.chosen .slotRect {
        fill:#22c55e
    }

    .slotText {
        fill: white;
        font-weight: 900;
        font-size: 18px;
        text-anchor: middle;
        pointer-events:none
    }

    .vline {
        stroke: var(--line);
        stroke-width: 5;
        stroke-linecap:round
    }

    .hline.random {
        stroke: var(--random);
        stroke-width: 6;
        stroke-linecap:round
    }

    .hline.player {
        stroke: var(--player);
        stroke-width: 11;
        stroke-linecap:round
    }

    .nameText, .resultText {
        font-weight: 900;
        fill: #283044;
        font-size: 16px;
        text-anchor:middle
    }

    .resultText {
        fill:#be185d
    }

    .pathLine {
        stroke: #22c55e;
        stroke-width: 6;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
        opacity: .92
    }

    .list {
        display: grid;
        gap:8px
    }

    .listItem {
        padding: 10px 12px;
        border-radius: 14px;
        background: #f8fafc;
        border: 2px solid #e2e8f0;
        font-weight:800
    }

    .listItem.current {
        background: #ffe4ef;
        border-color: #ff9ec4;
        color: #be185d
    }

    .resultGrid {
        display: grid;
        gap: 10px;
        margin-top:14px
    }

    .resultCard {
        padding: 12px;
        border-radius: 16px;
        background: #fdf2f8;
        border: 2px solid #f9a8d4;
        font-weight:900
    }

    .resultCard.big {
        background: #fff7ed;
        border-color:#fb923c
    }

    .resultCard.hit {
        background: #ecfeff;
        border-color:#22d3ee
    }

    .resultIcon {
        font-size: 24px;
        margin-right:6px
    }

    .hidden {
        display: none !important
    }

    .footerBtns {
        justify-content: center;
        margin: 18px 0 0
    }

    @media print {
        body {
            background:white
        }

        .noPrint, .steps, .side {
            display:none !important
        }

        .wrap {
            max-width: none;
            padding:0
        }

        .card {
            box-shadow: none;
            border:0
        }

        .boardWrap {
            border: 0;
            overflow:visible
        }

        svg {
            min-width:0
        }

        .resultGrid {
            break-inside: avoid
        }
    }
    </style>
</head>
<body>
    <div class="wrap">
        <header>
            <h1>みんなであみだくじ</h1>
            <div class="heroArt" aria-hidden="true">
                <svg viewBox="0 0 420 170" role="img">
                    <defs>
                        <linearGradient id="skyPop" x1="0" y1="0" x2="1" y2="1">
                            <stop offset="0" stop-color="#fff7b8"/>

                        </linearGradient>
                        <linearGradient id="rainbowLine" x1="0" x2="1">
                            <stop offset="0" stop-color="#ff7aa8"/>
                            <stop offset=".5" stop-color="#5ac8fa"/>
                            <stop offset="1" stop-color="#82e0aa"/>
                        </linearGradient>
                    </defs>
                    <rect x="18" y="18" width="384" height="128" rx="36" fill="url(#skyPop)" stroke="#fff" stroke-width="7"/>
                    <circle cx="72" cy="52" r="12" fill="#fff" opacity=".95"/>
                    <circle cx="88" cy="48" r="16" fill="#fff" opacity=".95"/>
                    <circle cx="106" cy="54" r="11" fill="#fff" opacity=".95"/>
                    <circle cx="316" cy="50" r="11" fill="#fff" opacity=".95"/>

                    <circle cx="350" cy="52" r="10" fill="#fff" opacity=".95"/>
                    <path d="M138 42 C168 72 154 104 188 128 S258 42 292 74" fill="none" stroke="url(#rainbowLine)" stroke-width="11" stroke-linecap="round"/>
                    <path d="M158 62 L204 62 M184 91 L236 91 M224 120 L276 120" stroke="#22c55e" stroke-width="8" stroke-linecap="round"/>
                    <g transform="translate(50 82)">
                        <ellipse cx="36" cy="36" rx="34" ry="30" fill="#ffffff" stroke="#ff9ec4" stroke-width="6"/>

                        <path d="M42 20 L54 4 L60 23" fill="#fff" stroke="#ff9ec4" stroke-width="6" stroke-linejoin="round"/>
                        <circle cx="25" cy="34" r="4" fill="#283044"/>
                        <circle cx="48" cy="34" r="4" fill="#283044"/>
                        <path d="M32 45 Q36 50 41 45" fill="none" stroke="#283044" stroke-width="4" stroke-linecap="round"/>
                        <circle cx="16" cy="43" r="6" fill="#ffd0e2"/>
                        <circle cx="56" cy="43" r="6" fill="#ffd0e2"/>
                    </g>
                    <g transform="translate(304 84)">
                        <ellipse cx="34" cy="36" rx="32" ry="29" fill="#ffffff" stroke="#5ac8fa" stroke-width="6"/>
                        <path d="M20 14 C12 -10 32 -8 29 16" fill="#fff" stroke="#5ac8fa" stroke-width="6" stroke-linecap="round"/>
                        <path d="M44 14 C48 -10 68 -4 52 18" fill="#fff" stroke="#5ac8fa" stroke-width="6" stroke-linecap="round"/>
                        <circle cx="24" cy="36" r="4" fill="#283044"/>
                        <circle cx="45" cy="36" r="4" fill="#283044"/>
                        <path d="M30 48 Q35 52 40 48" fill="none" stroke="#283044" stroke-width="4" stroke-linecap="round"/>
                        <circle cx="15" cy="45" r="6" fill="#dff7ff"/>
                        <circle cx="54" cy="45" r="6" fill="#dff7ff"/>
                    </g>
                    <circle cx="150" cy="30" r="8" fill="#ffb020"/>
                    <circle cx="284" cy="38" r="7" fill="#ff7aa8"/>
                    <circle cx="210" cy="28" r="6" fill="#82e0aa"/>
                </svg>
            </div>
        </header>

        <section class="steps noPrint" aria-label="使い方の流れ">
            <p class="stepsTitle">使い方は上から順番に進めます</p>
            <div class="stepList">
                <div class="step">
                    <strong>①</strong>
                    <span>必要な情報を入力</span>
                </div>
                <div class="step">
                    <strong>②</strong>
                    <span>あみだくじの作成</span>
                </div>
                <div class="step">
                    <strong>③</strong>
                    <span>順番を決める</span>
                </div>
                <div class="step">
                    <strong>④</strong>
                    <span>線を引く</span>
                </div>
                <div class="step">
                    <strong>⑤</strong>
                    <span>結果発表</span>
                </div>
                <div class="step">
                    <strong>⑥</strong>
                    <span>印刷</span>
                </div>
            </div>
        </section>

        <main id="app"></main>
        <p class="versionNote">ver7（2026/6/30）</p>
    </div>

    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
    import { getFirestore, collection, doc, getDoc, getDocs, setDoc, addDoc, updateDoc, deleteDoc, onSnapshot, query, orderBy, serverTimestamp, Timestamp, writeBatch, increment } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB8lg3L43uYYZivVgYeojPWUpXT6-ZnB1I",
        authDomain: "amidakuji-app.firebaseapp.com",
        projectId: "amidakuji-app",
        storageBucket: "amidakuji-app.firebasestorage.app",
        messagingSenderId: "21288891181",
        appId: "1:21288891181:web:0a9f3446b7bb1f1bf299a4",
        measurementId: "G-Z6QMD1Z6Z3"
    };

    const fbApp = initializeApp(firebaseConfig);
    const auth = getAuth(fbApp);
    const db = getFirestore(fbApp);
    const appEl = document.getElementById('app');
    const params = new URLSearchParams(location.search);
    const roomIdFromUrl = params.get('room');
    const isHostUrl = params.get('host') === '1';
    let uid = null;
    let state = {
        room: null,
        participants: [],
        lines: [],
        results: [],
        unsub: []
    };

    function esc(s) {
        return String(s ?? '').replace(/[&<>"]/g, c => ({
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;'
        }[c]));
    }
    function randId() {
        return Math.random().toString(36).slice(2, 8).toUpperCase();
    }
    async function uniqueRoomId() {
        for (let i = 0; i < 8; i++) {
            const id = randId();
            const snap = await getDoc(doc(db, 'rooms', id));
            if (!snap.exists())
                return id;
        }
        return randId() + Date.now().toString(36).slice(-2).toUpperCase();
    }
    function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }
    function nowPlusHours(h) {
        return Timestamp.fromDate(new Date(Date.now() + h * 60 * 60 * 1000));
    }
    function localUrl(roomId, host=false) {
        const base = location.href.split('?')[0];
        return `${base}?room=${encodeURIComponent(roomId)}${host ? '&host=1' : ''}`;
    }
    function qrUrl(url) {
        return `https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=${encodeURIComponent(url)}`;
    }
    function cleanUnsubs() {
        state.unsub.forEach(fn => {
            try {
                fn()
            } catch (e) {}
        });
        state.unsub = [];
    }
    function showMsg(html, cls='notice') {
        return `<div class="${cls}">${html}</div>`;
    }
    function roomRef() {
        return doc(db, 'rooms', roomIdFromUrl);
    }
    function participantsRef() {
        return collection(db, 'rooms', roomIdFromUrl, 'participants');
    }
    function linesRef() {
        return collection(db, 'rooms', roomIdFromUrl, 'horizontalLines');
    }
    function resultsRef() {
        return collection(db, 'rooms', roomIdFromUrl, 'results');
    }
    function isExpired(room) {
        return room?.expiresAt?.toDate && room.expiresAt.toDate().getTime() < Date.now();
    }

    onAuthStateChanged(auth, async user => {
        if (!user) {
            await signInAnonymously(auth);
            return;
        }
        uid = user.uid;
        if (roomIdFromUrl) {
            attachRoom();
        } else {
            renderCreateRoom();
        }
    });

    function defaultResultLabels(lineCount) {
        return Array.from({
            length: lineCount
        }, (_, i) => i === 0 ? '大当たり' : i === 1 ? '当たり' : 'はずれ');
    }

    function renderCreateRoom() {
        cleanUnsubs();
        appEl.innerHTML = `
            <div class="grid two">
              <section class="card side">
                <h2>① 必要な情報を入力</h2>
                <label>部屋名</label>
                <input id="title" value="みんなであみだくじ">
                <div class="row">
                  <div><label>人数</label><select id="lineCount">${[3, 4, 5, 6, 7, 8, 9, 10].map(n => `<option ${n === 3 ? 'selected' : ''}>${n}</option>`).join('')}</select></div>
                  <div><label>1人が引く線</label><select id="linesPerPlayer"><option value="1">1本</option><option value="2">2本</option></select></div>
                </div>
                <div class="row">
                  <div><label>段数</label><select id="rowCount">${[10, 12, 14, 16, 18, 20, 22, 24].map(n => `<option ${n === 16 ? 'selected' : ''}>${n}</option>`).join('')}</select></div>
                  <div><label>最初のランダム線</label><input id="randomLinePreview" value="自動で決まります" readonly></div>
                </div>
                <label>結果</label>
                <textarea id="resultsText">${defaultResultLabels(6).join('\n')}</textarea>
                <p class="small">人数を変えると、初期値は「大当たり」1つ、「当たり」1つ、それ以外は「はずれ」に自動調整されます。必要なら書き換えできます。</p>
                <div class="btns"><button id="createRoomBtn">② 部屋を作る</button></div>
              </section>
              <section class="card">
                <h2>この画面でできること</h2>
                ${showMsg('部屋を作るたびに、別々の部屋IDが自動で作られます。同時に複数の人が別の部屋を作っても、参加者や結果は混ざりません。', 'notice ok')}
                <p class="small">参加者には、次の画面で表示されるQRコードまたは参加者用URLだけを共有します。</p>
              </section>
            </div>`;
        const resultsEl = document.getElementById('resultsText');
        resultsEl.dataset.autoDefault = '1';
        resultsEl.addEventListener('input', () => {
            resultsEl.dataset.autoDefault = '0';
        });
        updateFormDefaults();
        ['lineCount', 'rowCount', 'linesPerPlayer'].forEach(id => document.getElementById(id).addEventListener('change', updateFormDefaults));
        document.getElementById('createRoomBtn').onclick = createRoom;
    }

    function updateFormDefaults() {
        updateRandomPreview();
        const resultsEl = document.getElementById('resultsText');
        const lineCount = Number(document.getElementById('lineCount')?.value || 3);
        if (resultsEl && resultsEl.dataset.autoDefault === '1')
            resultsEl.value = defaultResultLabels(lineCount).join('\n');
    }

    function updateRandomPreview() {
        const lineCount = Number(document.getElementById('lineCount')?.value || 3);
        const rowCount = Number(document.getElementById('rowCount')?.value || 16);
        const linesPerPlayer = Number(document.getElementById('linesPerPlayer')?.value || 1);
        const count = autoRandomLineCount(lineCount, rowCount, linesPerPlayer);
        const el = document.getElementById('randomLinePreview');
        if (el)
            el.value = `${count}本くらいを自動生成`;
    }

    function autoRandomLineCount(lineCount, rowCount, linesPerPlayer) {
        const maxPerRow = Math.max(1, Math.floor(lineCount / 2));
        const capacity = rowCount * maxPerRow;
        const playerTotal = lineCount * linesPerPlayer;
        const comfortableLimit = Math.max(0, capacity - playerTotal - lineCount);
        const suggested = Math.round(lineCount * 1.7 + rowCount * 0.25 + (linesPerPlayer === 1 ? 2 : 0));
        const min = Math.min(comfortableLimit, Math.max(lineCount, 4));
        const max = Math.min(40, comfortableLimit);
        return Math.max(0, Math.min(max, Math.max(min, suggested)));
    }

    async function createRoom() {
        const btn = document.getElementById('createRoomBtn');
        try {
            btn.disabled = true;
            btn.textContent = '部屋を作成中...';

            const roomId = await uniqueRoomId();
            const lineCount = Number(document.getElementById('lineCount').value);
            const rowCount = Number(document.getElementById('rowCount').value);
            const linesPerPlayer = Number(document.getElementById('linesPerPlayer').value);
            const randomLineCount = autoRandomLineCount(lineCount, rowCount, linesPerPlayer);
            let labels = document.getElementById('resultsText').value.split('\n').map(s => s.trim()).filter(Boolean);
            while (labels.length < lineCount)
                labels.push('はずれ');
            labels = labels.slice(0, lineCount);

            const r = doc(db, 'rooms', roomId);
            const createdAt = Timestamp.now();
            await setDoc(r, {
                title: document.getElementById('title').value.trim() || 'みんなであみだくじ',
                status: 'waiting',
                hostUid: uid,
                lineCount,
                maxPlayers: lineCount,
                rowCount,
                linesPerPlayer,
                randomLineCount,
                currentTurnIndex: 0,
                currentRound: 0,
                turnOrder: [],
                resultsHidden: true,
                resultsPublished: false,
                allLinesDone: false,
                createdAt,
                expiresAt: nowPlusHours(24),
                lastActionAt: createdAt
            });

            const batch = writeBatch(db);
            labels.forEach((label, index) => batch.set(doc(db, 'rooms', roomId, 'results', String(index)), {
                index,
                label,
                revealed: false
            }));
            await batch.commit();

            location.href = localUrl(roomId, true);
        } catch (e) {
            console.error(e);
            btn.disabled = false;
            btn.textContent = '② 部屋を作る';
            const msg = document.createElement('div');
            msg.className = 'notice bad';
            msg.innerHTML = `部屋を作れませんでした。Authenticationの匿名ログイン、Firestoreルール、Authorized domainsを確認してください。<br><span class="small">エラー: ${esc(e.code || e.message || e)}</span>`;
            btn.closest('.card').appendChild(msg);
        }
    }

    function attachRoom() {
        cleanUnsubs();
        appEl.innerHTML = `<section class="card">${showMsg('読み込み中です。', 'notice')}</section>`;
        state.unsub.push(onSnapshot(roomRef(), snap => {
            if (!snap.exists()) {
                appEl.innerHTML = `<section class="card">${showMsg('この部屋は見つかりません。', 'notice bad')}<a class="buttonLink secondary" href="${location.href.split('?')[0]}">新しく作る</a></section>`;
                return;
            }
            state.room = {
                id: snap.id,
                ...snap.data()
            };
            renderRoom();
        }));
        state.unsub.push(onSnapshot(query(participantsRef(), orderBy('joinedAt', 'asc')), snap => {
            state.participants = snap.docs.map(d => ({
                id: d.id,
                ...d.data()
            }));
            renderRoom();
        }));
        state.unsub.push(onSnapshot(query(linesRef(), orderBy('createdAt', 'asc')), snap => {
            state.lines = snap.docs.map(d => ({
                id: d.id,
                ...d.data()
            }));
            renderRoom();
        }));
        state.unsub.push(onSnapshot(query(resultsRef(), orderBy('index', 'asc')), snap => {
            state.results = snap.docs.map(d => ({
                id: d.id,
                ...d.data()
            }));

    }

    function statusHtml(room) {
        const current = currentParticipant(room);
        const done = state.participants.reduce((sum, p) => sum + Number(p.lineDrawCount || 0), 0);
        const total = state.participants.length * Number(room.linesPerPlayer || 1);
        return `<div class="notice ${room.allLinesDone ? 'ok' : ''}">
            <div>現在の状態：${esc(statusLabel(room.status))}</div>
            <div>現在の番：${current ? esc(current.name) : 'まだ決まっていません'}</div>

          </div>`;

    function statusLabel(s) {
        return ( {
                waiting: '参加者待ち',
                created: 'あみだ作成済み',
                ordering: '順番決定済み',
                playing: '線を引いています',
                finished: '結果発表済み',
                expired: '期限切れ'
            }[s] || s) ;
    }
    function participantsHtml() {
        const ordered = [...state.participants].sort((a, b) => (a.order ?? 999) - (b.order ?? 999));
        const current = currentParticipant(state.room);
        return ordered.map(p => `<div class="listItem ${current?.uid === p.uid ? 'current' : ''}">${esc(p.name)}　縦線${Number(p.selectedLine) + 1}　${p.order < 999 ? `順番${Number(p.order) + 1}` : '未定'}　${p.lineDrawCount || 0}本</div>`).join('') || '<div class="small">まだ参加者はいません。</div>';
    }
    function currentParticipant(room) {
        if (!room?.turnOrder?.length)
            return null;
        const id = room.turnOrder[room.currentTurnIndex] ?? null;
        return state.participants.find(p => p.uid === id) || null;
    }
    function turnMessage(room, me) {
        if (room.resultsPublished)
            return showMsg('結果が発表されました。下で確認できます。', 'notice ok');
        if (room.allLinesDone)
            return showMsg('全員が線を引き終わりました。結果発表を待っています。', 'notice ok');
        const cur = currentParticipant(room);
        if (room.status !== 'playing')
            return showMsg('主催者が順番を決めるまで待ってください。', 'notice');
        if (cur?.uid === me.uid)
            return showMsg('あなたの番です。あみだくじの中のピンク色の場所をタップして、横線を1本入れてください。', 'notice ok');
        return showMsg(`今は ${esc(cur?.name || '次の人')} さんの番です。`, 'notice');
    }

    function boardHtml(room, interactive) {
        const w = 760,
            h = 560,
            top = 70,
            bottom = 470,
            left = 70,
            right = 690;
        const n = room.lineCount,
            rowCount = room.rowCount;
        const xs = Array.from({
            length: n
        }, (_, i) => left + (right - left) * (i / (n - 1)));
        const rowY = r => top + (bottom - top) * ((r + 1) / (rowCount + 1));
        const showSlots = interactive && room.status === 'playing' && !room.allLinesDone && !room.resultsPublished && currentParticipant(room)?.uid === uid;
        let svg = `<div class="boardWrap">${showSlots ? '<div class="tapHint">今入れられる場所がピンクで光っています。好きな場所を1つタップしてください。</div>' : ''}<svg viewBox="0 0 ${w} ${h}" role="img" aria-label="あみだくじ">`;
        const byLine = new Map();
        state.participants.forEach(p => byLine.set(p.selectedLine, p.name));
        xs.forEach((x, i) => {
            svg += `<text class="nameText" x="${x}" y="32">${esc(byLine.get(i) || `${i + 1}`)}</text>`;
            svg += `<line class="vline" x1="${x}" y1="${top}" x2="${x}" y2="${bottom}"></line>`;
        });
        state.lines.forEach(l => {
            if (l.col >= 0 && l.col < n - 1)
                svg += `<line class="hline ${l.type === 'player' ? 'player' : 'random'}" x1="${xs[l.col]}" y1="${rowY(l.row)}" x2="${xs[l.col + 1]}" y2="${rowY(l.row)}"></line>`;
        });
        if (room.resultsPublished) {
            tracedPaths(room).forEach(path => {
                svg += `<path class="pathLine" d="${path.d}"></path>`
            });
        }
        for (let r = 0; r < rowCount; r++) {
            for (let c = 0; c < n - 1; c++) {
                const valid = showSlots && isValidSlot(r, c, room);
                const mid = (xs[c] + xs[c + 1]) / 2;
                svg += `<g class="slot ${valid ? 'active' : 'disabled'}" data-row="${r}" data-col="${c}"><rect class="slotRect" x="${xs[c] + 7}" y="${rowY(r) - 18}" width="${xs[c + 1] - xs[c] - 14}" height="36" rx="18"></rect>${valid ? `<text class="slotText" x="${mid}" y="${rowY(r) + 6}">＋</text>` : ''}</g>`;
            }
        }
        state.results.forEach(res => {
            const x = xs[res.index];
            svg += `<text class="resultText" x="${x}" y="528">${room.resultsPublished ? esc(res.label) : '？'}</text>`;
        });
        svg += `</svg></div>`;
        return svg;
    }
    function isValidSlot(row, col, room) {
        if (row < 0 || col < 0 || col >= room.lineCount - 1)
            return false;
        return !state.lines.some(l => l.row === row && (l.col === col || l.col === col - 1 || l.col === col + 1));
    }
    function bindSlotClicks(room, me) {
        if (room.status !== 'playing' || room.allLinesDone || room.resultsPublished)
            return;
        const cur = currentParticipant(room);
        if (cur?.uid !== me.uid)
            return;
        document.querySelectorAll('.slot.active').forEach(el => {
            el.addEventListener('click', async () => {
                const row = Number(el.dataset.row),
                    col = Number(el.dataset.col);
                if (!isValidSlot(row, col, room))
                    return;
                el.classList.add('chosen');
                await addPlayerLine(room, me, row, col);
            }, {
                once: true
            });
        });
    }
    async function addPlayerLine(room, me, row, col) {
        try {
            const batch = writeBatch(db);
            batch.set(doc(linesRef()), {
                row,
                col,
                by: uid,
                type: 'player',
                round: room.currentRound || 0,
                createdAt: serverTimestamp()
            });
            const pRef = doc(db, 'rooms', room.id, 'participants', uid);
            batch.update(pRef, {
                lineDrawCount: increment(1)
            });
            const simulated = state.participants.map(p => p.uid === uid ? {
                ...p,
                lineDrawCount: (p.lineDrawCount || 0) + 1
            } : p);
            const next = nextTurnIndex(room, simulated);
            const roomUpdates = {
                lastActionAt: serverTimestamp()
            };
            if (next === -1) {
                roomUpdates.allLinesDone = true;
            }
            else {
                roomUpdates.currentTurnIndex = next;
                roomUpdates.currentRound = Math.floor(totalDrawn(simulated) / Math.max(1, simulated.length));
            }
            batch.update(roomRef(), roomUpdates);
            await batch.commit();
        } catch (e) {
            alert('線の保存に失敗しました。ルール設定を確認してください。\n' + e.message);
        }
    }
    function totalDrawn(ps) {
        return ps.reduce((s, p) => s + Number(p.lineDrawCount || 0), 0);
    }
    function nextTurnIndex(room, ps) {
        const order = room.turnOrder || [];
        if (!order.length)
            return -1;
        const max = Number(room.linesPerPlayer || 1);
        let start = (Number(room.currentTurnIndex || 0) + 1) % order.length;
        for (let step = 0; step < order.length; step++) {
            const idx = (start + step) % order.length;
            const p = ps.find(x => x.uid === order[idx]);
            if (p && Number(p.lineDrawCount || 0) < max)
                return idx;
        }
        return -1;
    }

    function safePrint() {
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
        const room = state.room;
        const title = room?.title || 'みんなであみだくじ';
        const board = document.querySelector('.boardWrap')?.outerHTML || '';
        const results = document.querySelector('.resultGrid')?.outerHTML || '';
        const status = document.querySelector('.notice')?.outerHTML || '';
        const html = `<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>${esc(title)} 印刷</title><style>
            body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#283044;margin:18px;background:white}
            h1{text-align:center;margin:0 0 12px;font-size:26px}.notice{padding:10px 12px;border:1px solid #cbd5e1;border-radius:12px;margin-bottom:12px}.boardWrap{background:white;border:1px solid #cbd5e1;border-radius:12px;padding:8px;overflow:visible}svg{width:100%;height:auto;max-height:72vh}.resultGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:8px;margin-top:12px}.resultCard{border:2px solid #ffd0e2;border-radius:12px;padding:10px;text-align:center;font-weight:800}.noPrint{margin-top:14px;text-align:center}button{border:0;border-radius:999px;padding:12px 18px;font:inherit;font-weight:900;color:white;background:#5ac8fa;cursor:pointer}@media print{.noPrint{display:none!important}body{margin:0}.boardWrap{border:0}svg{max-height:none}}
          </style></head><body><h1>${esc(title)}</h1>${status}${board}${results}<div class="noPrint"><button onclick="window.print()">印刷する</button><p>印刷後、この画面は閉じてください。</p></div></body></html>`;
        const w = window.open('', '_blank');
        if (w && w.document) {
            w.document.open();
            w.document.write(html);
            w.document.close();
            setTimeout(() => {
                try {
                    w.focus();
                    w.print();
                } catch (e) {}
            }, 450);
            return;
        }
        if (isIOS) {
            alert('印刷画面を開けない場合は、Safari下部または上部の共有ボタンから「プリント」を選んでください。');
        }
        window.print();
    }

    function resultClass(label) {
        if (String(label).includes('大当たり'))
            return 'big';
        if (String(label).includes('当たり'))
            return 'hit';
        return '';
    }
    function resultIcon(label) {
        if (String(label).includes('大当たり'))
            return '🎉';
        if (String(label).includes('当たり'))
            return '⭐';
        return '😊';
    }
    function resultsHtml(room, me=null) {
        if (!room.resultsPublished)
            return `<div class="resultGrid"><div class="resultCard">結果はまだ隠れています。</div></div>`;
        const rows = state.participants.map(p => {
            const goal = traceGoal(room, p.selectedLine);
            const res = state.results.find(r => r.index === goal);
            const label = res?.label || `結果${goal + 1}`;
            const mine = me && p.uid === me.uid;
            return `<div class="resultCard ${resultClass(label)}" style="${mine ? 'border-width:4px' : ''}"><span class="resultIcon">${resultIcon(label)}</span>${esc(p.name)} → ${esc(label)}</div>`;
        }).join('');
        return `<h2>⑤ 結果発表</h2><div class="resultGrid">${rows}</div><div class="btns footerBtns noPrint"><button class="secondary" type="button" onclick="safePrint()">⑥ 印刷</button></div>`;
    }
    function traceGoal(room, startLine) {
        let pos = Number(startLine);
        const sorted = [...state.lines].sort((a, b) => a.row - b.row || a.col - b.col);
        sorted.forEach(l => {
            if (l.col === pos)
                pos++;
            else if (l.col + 1 === pos)
                pos--;
        });
        return pos;
    }
    function tracedPaths(room) {
        const paths = [];
        const w = 760,
            h = 560,
            top = 70,
            bottom = 470,
            left = 70,
            right = 690;
        const n = room.lineCount,
            rowCount = room.rowCount;
        const xs = Array.from({
            length: n
        }, (_, i) => left + (right - left) * (i / (n - 1)));
        const rowY = r => top + (bottom - top) * ((r + 1) / (rowCount + 1));
        state.participants.forEach(p => {
            let pos = Number(p.selectedLine),
                d = `M ${xs[pos]} ${top}`;
            [...state.lines].sort((a, b) => a.row - b.row || a.col - b.col).forEach(l => {
                const y = rowY(l.row);
                d += ` L ${xs[pos]} ${y}`;
                if (l.col === pos) {
                    pos++;
                    d += ` L ${xs[pos]} ${y}`;
                }
                else if (l.col + 1 === pos) {
                    pos--;
                    d += ` L ${xs[pos]} ${y}`;
                }
            });
            d += ` L ${xs[pos]} ${bottom}`;
            paths.push({
                uid: p.uid,
                d
            });
        });
        return paths;
    }

    function openQrModal(url) {
        const old = document.getElementById('qrModalBackdrop');
        if (old)
            old.remove();
        const div = document.createElement('div');
        div.className = 'modalBackdrop show';
        div.id = 'qrModalBackdrop';
        div.innerHTML = `<div class="qrModal" role="dialog" aria-modal="true" aria-label="参加用QRコード拡大表示">
            <h2>参加用QRコード</h2>
            <p class="small">Zoomで画面共有している時は、この大きなQRコードを読み取ってもらってください。</p>
            <img src="${qrUrl(url)}" alt="参加用QRコード拡大版">
            <div><button class="secondary modalClose" type="button" id="qrModalClose">閉じる</button></div>
          </div>`;
        document.body.appendChild(div);
        const close = () => div.remove();
        document.getElementById('qrModalClose').addEventListener('click', close);
        div.addEventListener('click', e => {
            if (e.target === div)
                close();
        });
        document.addEventListener('keydown', function escClose(e) {
            if (e.key === 'Escape') {
                close();
                document.removeEventListener('keydown', escClose);
            }
        });
    }

    async function bindHostButtons(room) {
        const joinUrlForModal = localUrl(room.id, false);
        const qrOpen = document.getElementById('qrZoomOpen');
        qrOpen?.addEventListener('click', () => openQrModal(joinUrlForModal));
        qrOpen?.addEventListener('keydown', e => {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                openQrModal(joinUrlForModal);
            }
        });
        document.getElementById('copyJoinUrlBtn')?.addEventListener('click', async () => {
            const input = document.getElementById('joinUrlInput');
            try {
                await navigator.clipboard.writeText(input.value);
                const btn = document.getElementById('copyJoinUrlBtn');
                btn.textContent = 'コピー済み';
                setTimeout(() => btn.textContent = 'コピー', 1200);
            } catch (e) {
                input.select();
                alert('URLを選択しました。コピーしてください。');
            }
        });
        document.getElementById('makeBoardBtn')?.addEventListener('click', async () => {
            try {
                const generated = generateRandomLines(room.lineCount, room.rowCount, room.randomLineCount);
                const batch = writeBatch(db);
                generated.forEach(l => batch.set(doc(linesRef()), {
                    ...l,
                    by: uid,
                    type: 'random',
                    round: -1,
                    createdAt: serverTimestamp()
                }));
                batch.update(roomRef(), {
                    status: 'created',
                    lastActionAt: serverTimestamp()
                });
                await batch.commit();
            } catch (e) {
                alert(e.message)
            }
        });
        document.getElementById('orderBtn')?.addEventListener('click', async () => {
            try {
                const ps = state.participants;
                const order = shuffle(ps.map(p => p.uid));
                const batch = writeBatch(db);
                order.forEach((id, i) => batch.update(doc(db, 'rooms', room.id, 'participants', id), {
                    order: i,
                    lineDrawCount: 0
                }));
                batch.update(roomRef(), {
                    turnOrder: order,
                    currentTurnIndex: 0,
                    currentRound: 0,
                    allLinesDone: false,
                    status: 'playing',
                    lastActionAt: serverTimestamp()
                });
                await batch.commit();
            } catch (e) {
                alert(e.message)
            }
        });
        document.getElementById('publishBtn')?.addEventListener('click', async () => {
            await updateDoc(roomRef(), {
                resultsHidden: false,
                resultsPublished: true,
                status: 'finished',
                lastActionAt: serverTimestamp()
            });
        });
        document.getElementById('undoBtn')?.addEventListener('click', async () => {
            const players = state.lines.filter(l => l.type === 'player');
            const last = players[players.length - 1];
            if (!last)
                return;
            if (!confirm('直前の線を戻しますか？'))
                return;
            const p = state.participants.find(x => x.uid === last.by);
            const batch = writeBatch(db);
            batch.delete(doc(db, 'rooms', room.id, 'horizontalLines', last.id));
            if (p)
                batch.update(doc(db, 'rooms', room.id, 'participants', p.uid), {
                    lineDrawCount: increment(-1)
                });
            const idx = Math.max(0, (room.turnOrder || []).indexOf(last.by));
            batch.update(roomRef(), {
                currentTurnIndex: idx,
                allLinesDone: false,
                status: 'playing',
                lastActionAt: serverTimestamp()
            });
            await batch.commit();
        });
        document.getElementById('deleteBtn')?.addEventListener('click', async () => {
            if (!confirm('この部屋データを削除します。参加者名や線も消えます。よろしいですか？'))
                return;
            await deleteRoomDeep(room.id);
            location.href = location.href.split('?')[0];
        });
    }
    function generateRandomLines(lineCount, rowCount, count) {
        const lines = [];
        let tries = 0;
        while (lines.length < count && tries < count * 30) {
            tries++;
            const row = Math.floor(Math.random() * rowCount);
            const col = Math.floor(Math.random() * (lineCount - 1));
            const bad = lines.some(l => l.row === row && (l.col === col || l.col === col - 1 || l.col === col + 1));
            if (!bad)
                lines.push({
                    row,
                    col
                });
        }
        return lines;
    }
    async function deleteRoomDeep(roomId) {
        const batch = writeBatch(db);
        const refs = [participantsRef(), linesRef(), resultsRef(), collection(db, 'rooms', roomId, 'turns')];
        for (const c of refs) {
            const snap = await getDocs(c);
            snap.forEach(d => batch.delete(d.ref));
        }
        batch.delete(doc(db, 'rooms', roomId));
        await batch.commit();
    }
